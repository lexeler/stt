{% extends "base.html" %}
{% block title %}Расшифровщик{% endblock %}

{% block body %}
<header class="topbar">
  <div class="brand">Расшифровщик<span class="accent">.</span></div>
  <form class="logout-form" method="post" action="/logout">
    <button class="logout-btn" type="submit">Выйти</button>
  </form>
</header>

<main class="main">
  <h1 class="hero-title">Загрузите аудио или видео</h1>
  <p class="hero-sub">Любой формат до 10 ГБ. Распознавание идёт локально на GPU.</p>

  <label class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="audio/*,video/*,.opus,.m4a,.flac,.ogg,.aac,.wav,.mp3,.mp4,.mkv,.mov,.webm" />
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"/>
        <path d="m7 8 5-5 5 5"/>
        <path d="M5 21h14"/>
      </svg>
    </div>
    <p class="drop-title">Перетащите файл</p>
    <p class="drop-sub">или нажмите, чтобы выбрать</p>
    <p class="drop-hint">mp3 · m4a · wav · mp4 · mkv и другие</p>
  </label>

  <section class="jobs" id="jobs"></section>
</main>

<template id="jobTemplate">
  <article class="job-card" data-status="queued">
    <div class="job-head">
      <div class="job-head-text">
        <p class="job-name"></p>
        <div class="job-meta">
          <span class="meta-size"></span>
          <span class="meta-duration"></span>
          <span class="meta-eta"></span>
        </div>
      </div>
      <div class="job-head-right">
        <div class="job-status-pill" data-status="queued">В очереди</div>
        <button type="button" class="btn-close" title="Удалить" style="display:none">×</button>
      </div>
    </div>

    <div class="progress"><div class="progress-bar"></div></div>
    <div class="job-stage">
      <span class="stage-text">Принято</span>
      <span class="pct">0%</span>
    </div>

    <div class="job-error" hidden></div>

    <div class="job-controls">
      <button type="button" class="btn-cancel" style="display:none">Отменить</button>
    </div>

    <div class="job-actions">
      <button type="button" class="btn-download btn-preview" data-kind="timestamps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="btn-label">Посмотреть</span>
      </button>
      <a class="btn-download primary" data-kind="clean">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12"/><path d="m7 12 5 5 5-5"/><path d="M5 21h14"/>
        </svg>
        Текст
      </a>
      <a class="btn-download" data-kind="timestamps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
        </svg>
        С таймкодами
      </a>
    </div>

    <div class="job-preview" hidden>
      <pre class="preview-text"></pre>
    </div>
  </article>
</template>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
{% endblock %}
