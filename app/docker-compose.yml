services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        gigaam: ../transcribe/GigaAM
    image: stt-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      COOKIE_SECURE: "true"
    volumes:
      - ./data:/opt/app/data
    expose:
      - "8000"
    networks: [web]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
