<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texpin</title>
<style>
  :root {
    --bg: #0e1014;
    --panel: #181b22;
    --panel-2: #20242d;
    --hover: #262b36;
    --text: #e6e9ef;
    --muted: #8a93a6;
    --accent: #5fb1ff;
    --accent-2: #3a8edc;
    --bad: #e05656;
    --border: #2a2f3a;
    --border-strong: #3a4150;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }
  header h1 {
    font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  header p {
    color: var(--muted); margin: 0 0 32px; font-size: 14px;
  }

  .drop {
    display: block;
    border: 2px dashed var(--border);
    background: var(--panel);
    border-radius: 14px;
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .drop:hover { background: var(--panel-2); border-color: var(--border-strong); }
  .drop.over { background: var(--panel-2); border-color: var(--accent); }
  .drop[aria-disabled="true"] { opacity: .5; pointer-events: none; }
  .drop-title { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
  .drop-hint { font-size: 13px; color: var(--muted); }

  #fileInput { position: absolute; left: -9999px; }

  .card {
    margin-top: 20px;
    padding: 18px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
    font-size: 14px;
  }
  .name {
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .stage { color: var(--muted); font-size: 13px; white-space: nowrap; }

  .bar {
    margin-top: 12px;
    height: 6px; width: 100%;
    background: var(--panel-2); border-radius: 3px; overflow: hidden;
  }
  .bar > div {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    transition: width .25s ease;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px;
    font: 14px/1.55 -apple-system, "Inter", sans-serif;
    resize: vertical;
    outline: none;
  }
  textarea:focus { border-color: var(--border-strong); }

  .actions {
    margin-top: 12px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 16px; font-size: 14px;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .btn:hover { background: var(--hover); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }

  .error {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(224,86,86,0.12);
    border: 1px solid rgba(224,86,86,0.35);
    color: #f0a8a8;
    border-radius: 10px;
    font-size: 14px;
  }

  .hidden { display: none !important; }

  footer {
    margin-top: 36px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Texpin</h1>
      <p>Расшифровка аудио и видео. Файл до 2 ГБ, длительность до 5 часов.</p>
    </header>

    <div class="drop" id="drop" role="button" tabindex="0">
      <div class="drop-title">Перетащи файл сюда</div>
      <div class="drop-hint">или нажми, чтобы выбрать</div>
    </div>
    <input type="file" id="fileInput" accept="audio/*,video/*">

    <div class="error hidden" id="error"></div>

    <div class="card hidden" id="status">
      <div class="row">
        <div class="name" id="filename">—</div>
        <div class="stage" id="stage">…</div>
      </div>
      <div class="bar"><div id="bar"></div></div>
    </div>

    <div class="hidden" id="result">
      <textarea id="text" readonly placeholder="Распознанный текст появится здесь"></textarea>
      <div class="actions">
        <button class="btn primary" id="copy">Скопировать</button>
        <button class="btn" id="download">Скачать .txt</button>
        <button class="btn" id="reset">Новый файл</button>
      </div>
    </div>

    <footer>v1 · GigaAM v3 RNN-T</footer>
  </div>

<script>
(() => {
  const drop = document.getElementById('drop');
  const fileInput = document.getElementById('fileInput');
  const status = document.getElementById('status');
  const filename = document.getElementById('filename');
  const stage = document.getElementById('stage');
  const bar = document.getElementById('bar');
  const result = document.getElementById('result');
  const text = document.getElementById('text');
  const errBox = document.getElementById('error');
  const copyBtn = document.getElementById('copy');
  const downloadBtn = document.getElementById('download');
  const resetBtn = document.getElementById('reset');

  let currentName = null;

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.remove('hidden');
  }
  function hideError() {
    errBox.classList.add('hidden');
  }

  function setStage(s, progress) {
    stage.textContent = s;
    if (typeof progress === 'number') {
      bar.style.width = Math.round(progress * 100) + '%';
    }
  }

  function reset() {
    fileInput.value = '';
    status.classList.add('hidden');
    result.classList.add('hidden');
    drop.setAttribute('aria-disabled', 'false');
    bar.style.width = '0%';
    hideError();
    currentName = null;
  }

  async function pollUntilDone(jobId, expectedSec) {
    let errs = 0;
    while (true) {
      try {
        const r = await fetch('/web/jobs/' + jobId, { credentials: 'same-origin' });
        if (!r.ok) {
          if (r.status === 429) throw new Error('Превышен лимит 20 запросов/час. Подожди.');
          if (r.status === 404) throw new Error('Задача потерялась на сервере.');
          throw new Error('HTTP ' + r.status);
        }
        const j = await r.json();
        errs = 0;
        setStage(j.stage || j.status, j.progress);
        if (j.status === 'done') return j;
        if (j.status === 'failed') throw new Error(j.error || 'Не удалось распознать');
        if (j.status === 'cancelled') throw new Error('Отменено');
      } catch (e) {
        if (++errs > 5) throw e;
      }
      const delay = Math.min(8000, Math.max(2000, (expectedSec || 10) * 80));
      await new Promise(r => setTimeout(r, delay));
    }
  }

  async function fetchResult(jobId) {
    const r = await fetch('/web/jobs/' + jobId + '/result', { credentials: 'same-origin' });
    if (!r.ok) throw new Error('Не удалось получить результат: HTTP ' + r.status);
    return await r.json();
  }

  async function uploadAndProcess(f) {
    hideError();
    drop.setAttribute('aria-disabled', 'true');
    status.classList.remove('hidden');
    result.classList.add('hidden');
    filename.textContent = f.name;
    currentName = f.name;
    setStage('Загрузка…', 0);

    const fd = new FormData();
    fd.append('file', f);

    let job;
    try {
      const r = await fetch('/web/upload', {
        method: 'POST',
        body: fd,
        credentials: 'same-origin',
      });
      if (!r.ok) {
        if (r.status === 429) throw new Error('Превышен лимит 20 запросов/час.');
        if (r.status === 413) throw new Error('Файл слишком большой.');
        if (r.status === 415) throw new Error('Это не аудио и не видео.');
        if (r.status === 503) throw new Error('Сервер занят. Попробуй через минуту.');
        const e = await r.json().catch(() => ({}));
        throw new Error(e.detail || ('HTTP ' + r.status));
      }
      job = await r.json();
    } catch (e) {
      showError(e.message || 'Ошибка загрузки');
      drop.setAttribute('aria-disabled', 'false');
      status.classList.add('hidden');
      return;
    }

    setStage(job.stage || 'В очереди', job.progress);

    let done;
    try {
      done = await pollUntilDone(job.id, job.eta_sec);
    } catch (e) {
      showError(e.message);
      drop.setAttribute('aria-disabled', 'false');
      return;
    }

    setStage('Готово', 1);

    let res;
    try {
      res = await fetchResult(job.id);
    } catch (e) {
      showError(e.message);
      drop.setAttribute('aria-disabled', 'false');
      return;
    }

    text.value = res.clean.trim();
    result.classList.remove('hidden');
    drop.setAttribute('aria-disabled', 'false');
  }

  // Click / keyboard activation on drop
  drop.addEventListener('click', () => fileInput.click());
  drop.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      fileInput.click();
    }
  });

  // Drag-and-drop
  ['dragenter', 'dragover'].forEach(ev => {
    drop.addEventListener(ev, (e) => {
      e.preventDefault();
      drop.classList.add('over');
    });
  });
  ['dragleave', 'drop'].forEach(ev => {
    drop.addEventListener(ev, (e) => {
      e.preventDefault();
      drop.classList.remove('over');
    });
  });
  drop.addEventListener('drop', (e) => {
    const f = e.dataTransfer.files[0];
    if (f) uploadAndProcess(f);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) uploadAndProcess(fileInput.files[0]);
  });

  // Actions
  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(text.value);
      copyBtn.textContent = 'Скопировано';
      setTimeout(() => copyBtn.textContent = 'Скопировать', 1500);
    } catch {
      text.select();
      document.execCommand('copy');
    }
  });
  downloadBtn.addEventListener('click', () => {
    const blob = new Blob([text.value], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (currentName ? currentName.replace(/\.[^.]+$/, '') : 'transcript') + '.txt';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
  });
  resetBtn.addEventListener('click', reset);
})();
</script>
</body>
</html>
